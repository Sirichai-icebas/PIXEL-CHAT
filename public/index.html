<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIXEL CHAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- SCREEN 1: LOBBY / PROFILE SETUP -->
  <div id="lobby" class="screen">
    <div class="lobby-card">
      <div class="lobby-logo">
        <div class="logo-block">P</div>
        <h1>PIXEL CHAT</h1>
      </div>
      <p class="subtitle">เลือกตัวละครแล้วเข้าเล่นเลย!</p>

      <div class="form-group">
        <label for="displayName">ชื่อผู้เล่น</label>
        <input type="text" id="displayName" maxlength="20" placeholder="ตั้งชื่อของคุณ..." autocomplete="off" />
        <span class="char-count"><span id="nameCount">0</span>/20</span>
      </div>

      <div class="form-group">
        <label>เลือกตัวละคร</label>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>

      <button id="joinBtn" class="btn-play" disabled>
        <span class="btn-play-icon">▶</span> เข้าเกม
      </button>
    </div>
  </div>

  <!-- SCREEN 2: ROOM LIST -->
  <div id="roomList" class="screen" style="display:none;">
    <header class="room-header">
      <div class="header-left">
        <div class="logo-block-sm">P</div>
        <span class="header-title">PIXEL CHAT</span>
      </div>
      <div class="header-right">
        <div class="user-badge" id="userBadge"></div>
      </div>
    </header>

    <div class="room-content">
      <div class="room-toolbar">
        <h2>ห้องแชท</h2>
        <button id="createRoomBtn" class="btn-create">+ สร้างห้อง</button>
      </div>

      <div class="room-grid" id="roomGrid">
        <!-- rooms injected here -->
      </div>
    </div>

    <!-- Create Room Modal -->
    <div id="createModal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <h3>สร้างห้องใหม่</h3>
        <div class="form-group">
          <label for="roomName">ชื่อห้อง</label>
          <input type="text" id="roomName" maxlength="30" placeholder="ตั้งชื่อห้อง..." autocomplete="off" />
        </div>
        <div class="form-group">
          <label>เลือกไอคอน</label>
          <div class="icon-grid" id="iconGrid"></div>
        </div>
        <div class="modal-actions">
          <button id="modalCancel" class="btn-cancel">ยกเลิก</button>
          <button id="modalCreate" class="btn-play btn-sm">สร้างห้อง</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: CHAT ROOM -->
  <div id="chatroom" class="screen" style="display:none;">
    <header class="chat-header">
      <div class="header-left">
        <button id="leaveBtn" class="btn-leave" title="ออกจากห้อง">✕</button>
        <span class="room-name-header" id="roomNameHeader">General Chat</span>
      </div>
      <div class="header-right">
        <span id="onlineCount" class="online-badge">0 ออนไลน์</span>
        <button id="toggleUsers" class="btn-icon" title="รายชื่อออนไลน์">👥</button>
      </div>
    </header>

    <div class="chat-body">
      <div class="messages-area" id="messagesArea">
        <div class="empty-state" id="emptyState">
          <p>ยังไม่มีข้อความ — เริ่มแชทเลย!</p>
        </div>
      </div>

      <aside class="users-panel" id="usersPanel">
        <h3>ผู้เล่นในห้อง (<span id="usersPanelCount">0</span>)</h3>
        <ul id="usersList"></ul>
      </aside>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <input type="text" id="msgInput" maxlength="500" placeholder="พิมพ์ข้อความ..." autocomplete="off" />
        <span class="char-remaining"><span id="charRemain">500</span></span>
      </div>
      <button id="sendBtn" class="btn-send" disabled>ส่ง</button>
    </div>

    <div id="reconnecting" class="reconnecting-overlay" style="display:none;">
      <p>กำลังเชื่อมต่อใหม่...</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
